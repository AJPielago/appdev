<svg width="300" height="180" viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="assetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05d9c3;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0072ff;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="180" fill="#0f1828" rx="12"/>
  
  <!-- Digital Assets Icons -->
  <!-- Bitcoin -->
  <g transform="translate(50, 40)">
    <circle cx="0" cy="0" r="20" fill="#f59e0b" opacity="0.8"/>
    <text x="0" y="6" text-anchor="middle" fill="white" font-family="Arial" font-size="24" font-weight="bold">₿</text>
  </g>
  
  <!-- Cloud Storage -->
  <g transform="translate(150, 40)">
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="url(#assetGradient)"/>
    <circle cx="-10" cy="-5" r="10" fill="url(#assetGradient)"/>
    <circle cx="10" cy="-5" r="8" fill="url(#assetGradient)"/>
  </g>
  
  <!-- Email Account -->
  <g transform="translate(250, 40)">
    <rect x="-20" y="-10" width="40" height="20" rx="4" fill="#00f2fe" opacity="0.6"/>
    <path d="M -20 -10 L 0 5 L 20 -10" stroke="#fff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Social Media -->
  <g transform="translate(50, 120)">
    <rect x="-15" y="-15" width="30" height="30" rx="8" fill="#7c3aed" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Digital Photos -->
  <g transform="translate(150, 120)">
    <rect x="-20" y="-15" width="40" height="30" rx="4" fill="#05d9c3" opacity="0.7"/>
    <circle cx="-8" cy="-5" r="4" fill="white" opacity="0.8"/>
    <polygon points="-15,10 -5,0 5,8 15,10" fill="white" opacity="0.6"/>
  </g>
  
  <!-- Investment Portfolio -->
  <g transform="translate(250, 120)">
    <rect x="-20" y="-15" width="40" height="30" rx="4" fill="#f59e0b" opacity="0.7"/>
    <path d="M -15 5 L -8 -5 L 0 2 L 8 -8 L 15 -2" stroke="white" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Connection Lines -->
  <line x1="70" y1="50" x2="130" y2="50" stroke="#00f2fe" stroke-width="1" opacity="0.3"/>
  <line x1="170" y1="50" x2="230" y2="50" stroke="#00f2fe" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="110" x2="130" y2="110" stroke="#00f2fe" stroke-width="1" opacity="0.3"/>
  <line x1="170" y1="110" x2="230" y2="110" stroke="#00f2fe" stroke-width="1" opacity="0.3"/>
</svg>