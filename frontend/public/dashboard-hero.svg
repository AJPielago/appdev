<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0072ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05080f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1828;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="200" fill="url(#grid)"/>
  
  <!-- Digital Will Icon -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="60" height="80" rx="8" fill="url(#heroGradient)" opacity="0.3"/>
    <rect x="8" y="8" width="44" height="64" rx="4" fill="none" stroke="#00f2fe" stroke-width="2"/>
    <line x1="16" y1="24" x2="44" y2="24" stroke="#00f2fe" stroke-width="2" opacity="0.8"/>
    <line x1="16" y1="36" x2="44" y2="36" stroke="#00f2fe" stroke-width="1.5" opacity="0.6"/>
    <line x1="16" y1="48" x2="36" y2="48" stroke="#00f2fe" stroke-width="1.5" opacity="0.6"/>
    <circle cx="40" cy="60" r="8" fill="#05d9c3" opacity="0.8"/>
    <path d="M 36 60 L 39 63 L 44 57" stroke="#05080f" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Blockchain Nodes -->
  <g transform="translate(150, 60)">
    <circle cx="0" cy="0" r="12" fill="#0072ff" opacity="0.6"/>
    <circle cx="40" cy="0" r="12" fill="#00f2fe" opacity="0.6"/>
    <circle cx="80" cy="0" r="12" fill="#05d9c3" opacity="0.6"/>
    <line x1="12" y1="0" x2="28" y2="0" stroke="#00f2fe" stroke-width="2"/>
    <line x1="52" y1="0" x2="68" y2="0" stroke="#00f2fe" stroke-width="2"/>
    
    <!-- Block labels -->
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">B1</text>
    <text x="40" y="5" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">B2</text>
    <text x="80" y="5" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">B3</text>
  </g>
  
  <!-- Security Shield -->
  <g transform="translate(300, 40)">
    <path d="M 25 10 L 40 20 L 40 50 C 40 60 25 70 25 70 C 25 70 10 60 10 50 L 10 20 Z" fill="url(#heroGradient)" opacity="0.8"/>
    <path d="M 25 10 L 40 20 L 40 50 C 40 60 25 70 25 70 C 25 70 10 60 10 50 L 10 20 Z" fill="none" stroke="#00f2fe" stroke-width="2"/>
    <path d="M 18 35 L 23 40 L 32 28" stroke="#05d9c3" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Floating particles -->
  <circle cx="80" cy="30" r="2" fill="#00f2fe" opacity="0.4"/>
  <circle cx="320" cy="160" r="3" fill="#05d9c3" opacity="0.3"/>
  <circle cx="120" cy="170" r="2" fill="#0072ff" opacity="0.5"/>
  <circle cx="280" cy="20" r="2" fill="#00f2fe" opacity="0.3"/>
</svg>