<svg width="300" height="180" viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vaultGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="lockGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="180" fill="#090e1a" rx="12"/>
  
  <!-- Vault Door -->
  <g transform="translate(150, 90)">
    <!-- Outer Vault -->
    <circle cx="0" cy="0" r="70" fill="url(#vaultGradient)" opacity="0.3"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="#00f2fe" stroke-width="3"/>
    <circle cx="0" cy="0" r="50" fill="#0f1828" stroke="#00f2fe" stroke-width="2"/>
    
    <!-- Lock Mechanism -->
    <circle cx="0" cy="0" r="25" fill="url(#lockGradient)" opacity="0.9"/>
    <circle cx="0" cy="0" r="20" fill="#05080f" stroke="#00f2fe" stroke-width="2"/>
    
    <!-- Lock Pattern -->
    <circle cx="0" cy="-8" r="3" fill="#00f2fe"/>
    <circle cx="7" cy="-4" r="3" fill="#00f2fe"/>
    <circle cx="7" cy="4" r="3" fill="#00f2fe"/>
    <circle cx="0" cy="8" r="3" fill="#00f2fe"/>
    <circle cx="-7" cy="4" r="3" fill="#00f2fe"/>
    <circle cx="-7" cy="-4" r="3" fill="#00f2fe"/>
    
    <!-- Central Lock -->
    <circle cx="0" cy="0" r="5" fill="#05d9c3"/>
    
    <!-- Vault Hinges -->
    <rect x="-75" y="-10" width="10" height="20" rx="2" fill="#00f2fe" opacity="0.6"/>
    <rect x="-75" y="-40" width="8" height="15" rx="2" fill="#00f2fe" opacity="0.4"/>
    <rect x="-75" y="25" width="8" height="15" rx="2" fill="#00f2fe" opacity="0.4"/>
  </g>
  
  <!-- Digital Documents floating around -->
  <g transform="translate(80, 40)">
    <rect x="0" y="0" width="30" height="40" rx="4" fill="#05d9c3" opacity="0.4"/>
    <line x1="6" y1="10" x2="24" y2="10" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="6" y1="16" x2="24" y2="16" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="6" y1="22" x2="18" y2="22" stroke="white" stroke-width="1" opacity="0.6"/>
  </g>
  
  <g transform="translate(190, 30)">
    <rect x="0" y="0" width="25" height="35" rx="3" fill="#7c3aed" opacity="0.5"/>
    <circle cx="12.5" cy="12" r="6" fill="white" opacity="0.7"/>
    <rect x="6" y="22" width="13" height="2" fill="white" opacity="0.5"/>
    <rect x="6" y="26" width="10" height="2" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Encryption Keys -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="15" height="8" rx="2" fill="#f59e0b" opacity="0.6"/>
    <circle cx="20" cy="4" r="4" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
    <rect x="22" y="2" width="4" height="4" fill="#f59e0b" opacity="0.6"/>
  </g>
  
  <g transform="translate(220, 140)">
    <rect x="0" y="0" width="15" height="8" rx="2" fill="#ff3860" opacity="0.6"/>
    <circle cx="20" cy="4" r="4" fill="none" stroke="#ff3860" stroke-width="2" opacity="0.6"/>
    <rect x="22" y="1" width="4" height="2" fill="#ff3860" opacity="0.6"/>
    <rect x="22" y="5" width="4" height="2" fill="#ff3860" opacity="0.6"/>
  </g>
  
  <!-- Secure Particles -->
  <circle cx="40" cy="70" r="2" fill="#00f2fe" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="100" r="1.5" fill="#05d9c3" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>