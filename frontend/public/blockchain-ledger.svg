<svg width="300" height="180" viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0072ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="180" fill="#05080f" rx="12"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="blockchainGrid" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="rgba(0,242,254,0.05)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="300" height="180" fill="url(#blockchainGrid)"/>
  
  <!-- Blockchain Blocks -->
  <!-- Block 1 -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="50" height="40" rx="6" fill="url(#blockGradient)" opacity="0.8"/>
    <rect x="2" y="2" width="46" height="36" rx="4" fill="none" stroke="#00f2fe" stroke-width="1"/>
    <text x="25" y="15" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">BLOCK</text>
    <text x="25" y="28" text-anchor="middle" fill="#05d9c3" font-family="monospace" font-size="12" font-weight="bold">#001</text>
    
    <!-- Hash visualization -->
    <rect x="8" y="32" width="34" height="4" rx="2" fill="#05d9c3" opacity="0.6"/>
  </g>
  
  <!-- Connection Arrow -->
  <g transform="translate(85, 88)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#00f2fe" stroke-width="2"/>
    <polygon points="20,0 15,-3 15,3" fill="#00f2fe"/>
  </g>
  
  <!-- Block 2 -->
  <g transform="translate(110, 70)">
    <rect x="0" y="0" width="50" height="40" rx="6" fill="url(#blockGradient)" opacity="0.8"/>
    <rect x="2" y="2" width="46" height="36" rx="4" fill="none" stroke="#00f2fe" stroke-width="1"/>
    <text x="25" y="15" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">BLOCK</text>
    <text x="25" y="28" text-anchor="middle" fill="#05d9c3" font-family="monospace" font-size="12" font-weight="bold">#002</text>
    
    <rect x="8" y="32" width="34" height="4" rx="2" fill="#05d9c3" opacity="0.6"/>
  </g>
  
  <!-- Connection Arrow -->
  <g transform="translate(165, 88)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#00f2fe" stroke-width="2"/>
    <polygon points="20,0 15,-3 15,3" fill="#00f2fe"/>
  </g>
  
  <!-- Block 3 -->
  <g transform="translate(190, 70)">
    <rect x="0" y="0" width="50" height="40" rx="6" fill="url(#blockGradient)" opacity="0.8"/>
    <rect x="2" y="2" width="46" height="36" rx="4" fill="none" stroke="#00f2fe" stroke-width="1"/>
    <text x="25" y="15" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">BLOCK</text>
    <text x="25" y="28" text-anchor="middle" fill="#05d9c3" font-family="monospace" font-size="12" font-weight="bold">#003</text>
    
    <rect x="8" y="32" width="34" height="4" rx="2" fill="#05d9c3" opacity="0.6"/>
  </g>
  
  <!-- Mining Animation -->
  <g transform="translate(260, 70)">
    <rect x="0" y="0" width="30" height="40" rx="6" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="15" y="15" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8" font-weight="bold">MINING</text>
    <text x="15" y="28" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold">#004</text>
  </g>
  
  <!-- Hash Lines -->
  <g transform="translate(50, 130)">
    <text x="0" y="0" fill="#05d9c3" font-family="monospace" font-size="8">Hash: 0x7f9a2b...</text>
    <text x="80" y="0" fill="#05d9c3" font-family="monospace" font-size="8">0x3c8d1e...</text>
    <text x="160" y="0" fill="#05d9c3" font-family="monospace" font-size="8">0x9e4a7b...</text>
  </g>
  
  <!-- Security Shield -->
  <g transform="translate(150, 25)">
    <path d="M 0 0 L 8 4 L 8 20 C 8 24 0 28 0 28 C 0 28 -8 24 -8 20 L -8 4 Z" fill="url(#blockGradient)" opacity="0.6"/>
    <path d="M -4 12 L -1 15 L 4 9" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Floating data particles -->
  <circle cx="40" cy="40" r="1.5" fill="#00f2fe" opacity="0.6">
    <animate attributeName="cy" values="40;20;40" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="140" r="2" fill="#05d9c3" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>